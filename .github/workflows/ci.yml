name: CI / CD

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  AWS_REGION: us-east-1
  ECR_REPO: assetport

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Lint, type-check, test
  # ---------------------------------------------------------------------------
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with ruff
        run: ruff format --check .

      - name: Type check with mypy
        run: mypy app/

      - name: Run tests
        run: pytest tests/ --cov=app --cov-report=term-missing

  # ---------------------------------------------------------------------------
  # Job 2 — Build Docker image, push to ECR
  # Runs only on push to main/master (not on PRs)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPO:latest" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPO:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Job 3 — Deploy: SSH into EC2, pull new image, restart container
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            AWS_REGION="${{ env.AWS_REGION }}"
            ECR_REGISTRY="${{ needs.build-and-push.outputs.ECR_REGISTRY }}"

            # Re-authenticate to ECR (token expires every 12h)
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin \
                "$(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_REGION.amazonaws.com"

            docker pull "${{ needs.build-and-push.outputs.image }}"

            docker stop assetport || true
            docker rm   assetport || true

            docker run -d \
              --name assetport \
              --restart always \
              --env-file /etc/assetport.env \
              -p 8501:8501 \
              "${{ needs.build-and-push.outputs.image }}"

            docker image prune -f
